    <body>

        <header>
            <img src="https://cdn-icons-png.flaticon.com/128/3781/3781609.png" alt="Logo of MechTeam" width="32" height="32">

                <a href="index.html">Начало</a> |
                <a href="#">Изтегли!</a> |

        <main>

            <!-- The header below should be stylized and overlayed on top of the gameplay image -->
            <h1> MechTeam </h1>
            <img src="https://cdn-icons-png.flaticon.com/128/3781/3781609.png" alt="Picture of MechTeam">
            
            <section>

                <h2>Нова стратегическа игра!</h2>
                <!-- Pictures should be to the right of description -->
                <article>
                    <p>
                        (Кратко описание на играта)
                    </p>
                </article>
                <img src="https://cdn-icons-png.flaticon.com/128/3781/3781609.png" alt="Gameplay image showing mech construction">
                <img src="https://cdn-icons-png.flaticon.com/128/3781/3781609.png" alt="Gameplay image showing mech combat">

            </section>

            <div class="vertical-split-container">

                <section class="left-side">

                    <!-- Add gameplay video below; remove header -->
                    <h2>Gameplay видео</h2>
                    <iframe alt="Gameplay video of MechTeam"></iframe>

                </section>

                <section class="right-side">

                    <!-- Section needs a better name; Should be to the right of video -->
                    <h2>Режими на игра</h2>
                    <article class="alt-row-1">
                        <!-- Each feature description should be overlayed on top of the feature image -->
                        <div class="captioned-image">
                            <h3><strong>feature 1</strong></h3>
                            <img src="https://cdn-icons-png.flaticon.com/128/3781/3781609.png" alt="Image of feature 1">
                        </div>
                    </article>
                    <article class="alt-row-2">
                        <div class="captioned-image">
                            <h3><strong>feature 2</strong></h3>
                            <img src="https://cdn-icons-png.flaticon.com/128/3781/3781609.png" alt="Image of feature 2">
                        </div>
                    </article>
                    <article class="alt-row-1">
                        <div class="captioned-image">
                            <h3><strong>feature 3</strong></h3>
                            <img src="https://cdn-icons-png.flaticon.com/128/3781/3781609.png" alt="Image of feature 3">
                        </div>
                    </article>

                </section>

            </div>
            

            <!-- News and updates sections should be side to side -->
            <div class="vertical-split-container">

                    <section class="left-side">

                        <h2>Новини</h2>
                        <article>
                            <ul>
                                <li><strong>feature 1</strong></li>
                                <li><strong>feature 2</strong></li>
                                <li><strong>feature 3</strong></li>
                            </ul>
                        </article>

                    </section>

                    <section class="right-side">

                        <h2>Ъпдейти</h2>
                        <article>
                            <ul>
                                <li><strong>feature 1</strong></li>
                                <li><strong>feature 2</strong></li>
                                <li><strong>feature 3</strong></li>
                            </ul>
                        </article>

                    </section>

            За контакт: example@gmail.com
