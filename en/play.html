<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Play MechTeam directly in your browser. Build your mech and face enemies in this chaotic strategy game."
        />
        <title>MechTeam</title>
        <link
            rel="icon"
            type="image/x-icon"
            href="../assets/media/img/logo.png"

            href="04b19.woff2"

            crossorigin
        />

        <script src="../assets/js/scripts.js" defer></script>

    <body class="fullscreen-bg">
        <header
            class="column-container centered-container absolute frost-backdrop"
        >
            <img
                src="../assets/media/img/logo.png"
                alt="Logo of MechTeam"
                width="64"
                height="64"
            />
            <nav class="column-container">
                <a href="index.html"
                    ><button title="Main Page" class="ui-btn">
                        <span>Home</span>
                    </button></a
                >
                <a href="play.html"
                    ><button title="Play Game" class="ui-btn">
                        <span>Play!</span>
                    </button></a

                <a href="about.html"

                <a href="../bg/index.html"
                    ><button title="Българска версия" class="ui-btn">
                        <span>БГ</span>
                    </button></a
                >
                <button
                    title="Toggle Dark Mode"
                    class="ui-btn"
                    id="themeToggle"
                >
                    <img
                        alt="Dark Mode Icon"
                        src="../assets/media/img/icons/sun.png"
                        height="40px"
                        width="40px"
                    />
                </button>
            </nav>
        </header>

        <main>
            <!-- Use banner class as header spacer -->
            <div class="banner"></div>
            <div class="game-container" style="padding-top: 80px">

                    class="responsive-iframe"

                    allowfullscreen=""
